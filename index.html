<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虛擬口袋藝廊：遇見維梅爾 (Meet Vermeer)</title>
    <style>
        /* 全域樣式：模擬高質感、低調奢華的博物館暗色展廳 */
        :root {
            --bg-color: #121212;
            --wall-color: #1a1a1a;
            --floor-color: #2a2521;
            --text-main: #e0e0e0;
            --text-muted: #aaaaaa;
            --accent-gold: #d4af37;
            --spotlight: radial-gradient(circle at 50% 30%, #333333 0%, #1a1a1a 70%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 頂部導覽列 */
        header {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            z-index: 10;
        }

        header h1 {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        header h1 span {
            color: var(--accent-gold);
            font-weight: 600;
        }

        /* 展廳選單 */
        .room-nav {
            display: flex;
            gap: 15px;
        }

        .room-btn {
            background: transparent;
            border: 1px solid #444;
            color: var(--text-muted);
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .room-btn.active, .room-btn:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            background-color: rgba(212, 175, 55, 0.1);
        }

        /* 虛擬 3D 展廳舞台 */
        .gallery-viewport {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
            background: var(--spotlight);
        }

        /* 展牆 container */
        .gallery-wall {
            width: 100%;
            max-width: 1200px;
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 50px;
            justify-items: center;
            align-items: center;
            animation: fadeIn 0.6s ease forwards;
        }

        .gallery-wall.active {
            display: grid;
        }

        /* 畫作單元 */
        .artwork-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
        }

        /* 模擬實體畫框與黃金投射燈光影 */
        .frame {
            background: #000;
            padding: 15px;
            border: 8px solid #2c2519; /* 仿木質外框 */
            box-shadow: 0 10px 25px rgba(0,0,0,0.8), 
                        0 0 40px rgba(255,255,255,0.05);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .frame:hover {
            transform: scale(1.03) translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.9), 
                        0 0 50px rgba(214, 175, 87, 0.2); /* 投射燈加強效果 */
        }

        .frame img {
            max-width: 100%;
            height: 260px;
            object-fit: contain;
            display: block;
        }

        /* 畫作名牌 */
        .painting-label {
            margin-top: 15px;
            background: #1e1e1e;
            padding: 10px 15px;
            border-left: 3px solid var(--accent-gold);
            width: 85%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .painting-label h3 {
            font-size: 16px;
            color: #fff;
            margin-bottom: 4px;
        }

        .painting-label p {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* 模擬展廳地板（營造空間透視感） */
        .gallery-floor {
            height: 40px;
            background: linear-gradient(to bottom, #151311, #0a0908);
            border-top: 1px solid #222;
        }

        /* 點擊放大查看 (Lightbox 彈出層) */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 10, 10, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 40px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox-overlay.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            background: #1a1a1a;
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            border: 1px solid #333;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            animation: slideUp 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @media (max-width: 768px) {
            .lightbox-content {
                grid-template-columns: 1fr;
                max-height: 90vh;
                overflow-y: auto;
            }
        }

        .lightbox-view {
            background: #0d0d0d;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lightbox-view img {
            max-width: 100%;
            max-height: 500px;
            object-fit: contain;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .lightbox-info {
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .lightbox-info h2 {
            font-size: 28px;
            color: #fff;
            margin-bottom: 10px;
            border-bottom: 2px solid var(--accent-gold);
            padding-bottom: 10px;
        }

        .meta-table {
            width: 100%;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .meta-table td {
            padding: 6px 0;
        }

        .meta-table td.label {
            color: var(--text-muted);
            width: 35%;
            font-weight: bold;
        }

        .painting-desc {
            font-size: 15px;
            line-height: 1.6;
            color: #ccc;
        }

        /* 關閉按鈕 */
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 30px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: var(--accent-gold);
        }

        /* 動態特效 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        footer {
            text-align: center;
            padding: 15px;
            background-color: #0d0d0d;
            font-size: 12px;
            color: #555;
            border-top: 1px solid #1a1a1a;
        }
    </style>
</head>
<body>

    <header>
        <h1>POCKET GALLERY: <span>VERMEER</span></h1>
        <nav class="room-nav">
            <button class="room-btn active" onclick="switchRoom('room1')">展廳 I：經典群像</button>
            <button class="room-btn" onclick="switchRoom('room2')">展廳 II：光影空間</button>
        </nav>
    </header>

    <main class="gallery-viewport">
        
        <div id="room1" class="gallery-wall active">
            <div class="artwork-container">
                <div class="frame" onclick="openLightbox(0)">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/0/0f/1665_Girl_with_a_Pearl_Earring.jpg" alt="戴珍珠耳環的少女">
                </div>
                <div class="painting-label">
                    <h3>戴珍珠耳環的少女</h3>
                    <p>約 1665 年 | 海牙莫瑞泰斯皇家美術館</p>
                </div>
            </div>

            <div class="artwork-container">
                <div class="frame" onclick="openLightbox(1)">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/2/20/Johannes_Vermeer_-_The_Milkmaid_-_Rijksmuseum.jpg" alt="倒牛奶的女僕">
                </div>
                <div class="painting-label">
                    <h3>倒牛奶的女僕</h3>
                    <p>約 1658 年 | 阿姆斯特丹國家博物館</p>
                </div>
            </div>

            <div class="artwork-container">
                <div class="frame" onclick="openLightbox(2)">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/6/66/Johannes_Vermeer_-_The_Little_Street_-_Google_Art_Project.jpg" alt="小街">
                </div>
                <div class="painting-label">
                    <h3>小街</h3>
                    <p>約 1658 年 | 阿姆斯特丹國家博物館</p>
                </div>
            </div>
        </div>

        <div id="room2" class="gallery-wall">
            <div class="artwork-container">
                <div class="frame" onclick="openLightbox(3)">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e4/Johannes_Vermeer_-_The_Astronomer_-_Louvre_Museum.jpg" alt="天文学家">
                </div>
                <div class="painting-label">
                    <h3>天文學家</h3>
                    <p>1668 年 | 巴黎羅浮宮</p>
                </div>
            </div>

            <div class="artwork-container">
                <div class="frame" onclick="openLightbox(4)">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Johannes_Vermeer_-_The_Geographer_-_St%C3%A4del_Museum.jpg" alt="地理学家">
                </div>
                <div class="painting-label">
                    <h3>地理學家</h3>
                    <p>1669 年 | 法蘭克福施泰德藝術館</p>
                </div>
            </div>

            <div class="artwork-container">
                <div class="frame" onclick="openLightbox(5)">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d6/Johannes_Vermeer_-_The_Love_Letter_-_Google_Art_Project.jpg" alt="情书">
                </div>
                <div class="painting-label">
                    <h3>情書</h3>
                    <p>約 1669 年 | 阿姆斯特丹國家博物館</p>
                </div>
            </div>
        </div>

    </main>

    <div class="gallery-floor"></div>

    <div id="lightbox" class="lightbox-overlay" onclick="closeLightbox(event)">
        <div class="lightbox-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeLightbox(event)">&times;</button>
            <div class="lightbox-view">
                <img id="lb-img" src="" alt="">
            </div>
            <div class="lightbox-info">
                <h2 id="lb-title">畫作名稱</h2>
                <table class="meta-table">
                    <tr>
                        <td class="label">創作年份</td>
                        <td id="lb-year">1600</td>
                    </tr>
                    <tr>
                        <td class="label">材質規格</td>
                        <td id="lb-size">油彩．畫布</td>
                    </tr>
                    <tr>
                        <td class="label">現藏地點</td>
                        <td id="lb-location">博物館位置</td>
                    </tr>
                </table>
                <p id="lb-desc" class="painting-desc">畫作詳細背景故事介紹...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 虛擬口袋藝廊工具 - 致敬 Johannes Vermeer 數位聚合計畫</p>
    </footer>

    <script>
        // 畫作精細資料庫 (對應 Google Arts pocket gallery 的核心展品導覽)
        const artworkData = [
            {
                title: "戴珍珠耳環的少女 (Girl with a Pearl Earring)",
                year: "約 1665 年",
                size: "油彩．畫布, 46.5 × 40 cm",
                location: "荷蘭海牙 莫瑞泰斯皇家美術館",
                desc: "被譽為「北方的蒙娜麗莎」。維梅爾在這幅作品中運用了極致的特寫視角，少女回眸的瞬間栩栩如生。她耳畔巨大的珍珠耳環在深色背景中完美捕捉了室內微弱的側光，展現了畫家高超的光影控制技術。",
                img: "https://upload.wikimedia.org/wikipedia/commons/0/0f/1665_Girl_with_a_Pearl_Earring.jpg"
            },
            {
                title: "倒牛奶的女僕 (The Milkmaid)",
                year: "約 1658–1660 年",
                size: "油彩．畫布, 45.5 × 41 cm",
                location: "荷蘭阿姆斯特丹 國家博物館",
                desc: "這是維梅爾最著名的一幅日常勞動場景。畫中女僕正專注地倒著牛奶，整個畫面安靜而尊嚴。透過左側窗戶射入的光線，精準地打在麵包籃與流淌的牛奶上，畫面上精細的微小亮點（點彩法）賦予物品無與倫比的質感。",
                img: "https://upload.wikimedia.org/wikipedia/commons/2/20/Johannes_Vermeer_-_The_Milkmaid_-_Rijksmuseum.jpg"
            },
            {
                title: "小街 (The Little Street)",
                year: "約 1657–1658 年",
                size: "油彩．畫布, 54.3 × 44 cm",
                location: "荷蘭阿姆斯特丹 國家博物館",
                desc: "維梅爾罕見的戶外街景畫作，描繪了台夫特（Delft）一隅的日常生活。磚牆的錯落紋理、剝落的灰泥以及正在做針線活與玩耍的婦女和孩童，呈現出極其寧靜、祥和且充滿生活質感的荷蘭小鎮風情。",
                img: "https://upload.wikimedia.org/wikipedia/commons/6/66/Johannes_Vermeer_-_The_Little_Street_-_Google_Art_Project.jpg"
            },
            {
                title: "天文學家 (The Astronomer)",
                year: "1668 年",
                size: "油彩．畫布, 50.8 × 46.3 cm",
                location: "法國巴黎 羅浮宮博物館",
                desc: "這幅作品反映了17世紀荷蘭黃金時代對科學與探索的狂熱。畫中的科學家正凝神注視著天球儀，桌上散落著星盤與書籍。從窗戶照進來的光線不僅照亮了其研究工具，也象徵著理性與科學知識的啟蒙之光。",
                img: "https://upload.wikimedia.org/wikipedia/commons/e/e4/Johannes_Vermeer_-_The_Astronomer_-_Louvre_Museum.jpg"
            },
            {
                title: "地理學家 (The Geographer)",
                year: "1668–1669 年",
                size: "油彩．畫布, 53 × 46.6 cm",
                location: "德國法蘭克福 施泰德藝術館",
                desc: "與《天文學家》為孿生之作。地理學家手持圓規、身穿學者長袍，正抬頭望向窗外，似乎正處於思索地圖測繪的靈感瞬間。畫中對於地圖細節、地球儀以及室內透視深度的掌控極其驚人。",
                img: "https://upload.wikimedia.org/wikipedia/commons/d/d0/Johannes_Vermeer_-_The_Geographer_-_St%C3%A4del_Museum.jpg"
            },
            {
                title: "情書 (The Love Letter)",
                year: "約 1669–1670 年",
                size: "油彩．畫布, 44 × 38.5 cm",
                location: "荷蘭阿姆斯特丹 國家博物館",
                desc: "採用獨特的「窺視視角」，透過前方的暗室門扉向內望去。室內一名手持魯特琴的仕女剛接過女僕遞來的信件，兩人的神情充滿了戲劇性的張力與默契。背景中的海景畫作暗喻了愛情的波折與思念。",
                img: "https://upload.wikimedia.org/wikipedia/commons/d/d6/Johannes_Vermeer_-_The_Love_Letter_-_Google_Art_Project.jpg"
            }
        ];

        // 展廳切換功能
        function switchRoom(roomId) {
            // 切換展牆顯示
            document.querySelectorAll('.gallery-wall').forEach(wall => {
                wall.classList.remove('active');
            });
            document.getElementById(roomId).classList.add('active');

            // 切換導覽按鈕樣式
            document.querySelectorAll('.room-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        // 開啟放大導覽面板 (Lightbox)
        function openLightbox(index) {
            const data = artworkData[index];
            document.getElementById('lb-img').src = data.img;
            document.getElementById('lb-title').innerText = data.title;
            document.getElementById('lb-year').innerText = data.year;
            document.getElementById('lb-size').innerText = data.size;
            document.getElementById('lb-location').innerText = data.location;
            document.getElementById('lb-desc').innerText = data.desc;

            const lightbox = document.getElementById('lightbox');
            lightbox.classList.add('active');
        }

        // 關閉導覽面板
        function closeLightbox(event) {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
        }

        // 監聽鍵盤 ESC 鍵以便快速關閉
        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape") {
                const lightbox = document.getElementById('lightbox');
                if (lightbox.classList.contains('active')) {
                    lightbox.classList.remove('active');
                }
            }
        });
    </script>
</body>
</html>
